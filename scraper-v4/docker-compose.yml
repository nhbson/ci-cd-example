version: '3'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: python api/app.py
    ports:
      - "5000:5000"
    depends_on:
      - redis

  worker:
    build: .
    command: python worker/worker.py
    depends_on:
      - redis
    deploy:
      replicas: 3   # SCALE HERE 🚀