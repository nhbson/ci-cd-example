services:

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./www:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2

  app1:
    build: .
    working_dir: /var/www
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000
    volumes:
      - ./www:/var/www
    depends_on:
      - redis
      - mysql

  app2:
    build: .
    working_dir: /var/www
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000
    volumes:
      - ./www:/var/www
    depends_on:
      - redis
      - mysql

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    ports:
      - "3308:3306"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  soketi:
    image: quay.io/soketi/soketi:latest
    ports:
      - "6001:6001"
    environment:
      SOKETI_DEFAULT_APP_ID: "app-id"
      SOKETI_DEFAULT_APP_KEY: "app-key"
      SOKETI_DEFAULT_APP_SECRET: "app-secret"
      SOKETI_REDIS_HOST: redis

  queue:
    build: .
    working_dir: /var/www
    command: php artisan queue:work
    volumes:
      - ./www:/var/www
    depends_on:
      - redis
      - mysql