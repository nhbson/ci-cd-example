# --------------------------
# Upstream backend servers
# --------------------------
upstream backend {
    least_conn;
    server app1:8000;
    server app2:8000;
}

# --------------------------
# Rate limit zone definition
# --------------------------
# Limit: 10 requests/sec per IP, store state for 10 minutes
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# --------------------------
# Main server block
# --------------------------
server {
    listen 80;

    # --------------------------
    # API rate limiting
    # --------------------------
    location /api/ {
        # Apply rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Pass to backend
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --------------------------
    # Main web app
    # --------------------------
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --------------------------
    # Soketi WebSocket (real-time)
    # --------------------------
    location /app {
        proxy_pass http://soketi:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --------------------------
    # Optional: Return 429 for throttled requests
    # --------------------------
    error_page 429 = @too_many_requests;
    location @too_many_requests {
        return 429 "Too Many Requests\n";
    }
}