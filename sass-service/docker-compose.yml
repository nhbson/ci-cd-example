services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./src:/var/www # ✅ FIX: bind mount đúng
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www
    env_file: .env
    depends_on:
      - redis
      - mysql
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file: .env
    depends_on:
      - redis
      - mysql
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=90

  redis:
    image: redis:7
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.4 # hoặc giữ mysql:8 nhưng hiểu nó là 8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    command: --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  redis_data:
  vendor:
