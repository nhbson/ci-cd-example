services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3

  app1:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file: .env
    depends_on:
      - redis
      - mysql
    command: >
      php artisan octane:start
      --server=swoole
      --host=0.0.0.0
      --port=8000
      --workers=1
      --task-workers=2
      --max-requests=10000

  app2:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file: .env
    depends_on:
      - redis
      - mysql
    command: >
      php artisan octane:start
      --server=swoole
      --host=0.0.0.0
      --port=8000
      --workers=1
      --task-workers=2
      --max-requests=10000

  app3:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file: .env
    depends_on:
      - redis
      - mysql
    command: >
      php artisan octane:start
      --server=swoole
      --host=0.0.0.0
      --port=8000
      --workers=1
      --task-workers=2
      --max-requests=10000

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file: .env
    depends_on:
      - redis
      - mysql
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=90

  redis:
    image: redis:7
    command: redis-server --save "" --appendonly no
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  redis_data:
