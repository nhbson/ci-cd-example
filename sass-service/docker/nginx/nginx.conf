worker_processes auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 🔥 Core performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 🔥 Keepalive tuning
    keepalive_timeout 20;
    keepalive_requests 100000;

    # 🔥 Reset timed out connections (giảm socket leak)
    reset_timedout_connection on;

    # 🔥 Buffer tuning
    client_body_buffer_size 128k;
    client_max_body_size 10m;

    # 🔥 File descriptor cache
    open_file_cache max=200000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # 🔥 Gzip (nhẹ, không ảnh hưởng nhiều CPU)
    gzip on;
    gzip_comp_level 2;
    gzip_min_length 1000;
    gzip_types text/plain application/json;

    # 🔥 Logging OFF (quan trọng khi benchmark)
    access_log off;
    error_log /var/log/nginx/error.log crit;

    # 🚀 Load balancing
    upstream octane {
        least_conn;

        server app1:8000 max_fails=2 fail_timeout=3s;
        server app2:8000 max_fails=2 fail_timeout=3s;
        server app3:8000 max_fails=2 fail_timeout=3s;

        keepalive 128;
    }

    server {
        listen 80 reuseport backlog=65535;
        server_name _;

        location / {
            proxy_pass http://octane;

            # 🔥 HTTP/1.1 keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 🔥 Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 🔥 Timeout tuning (aggressive hơn)
            proxy_connect_timeout 2s;
            proxy_send_timeout 20s;
            proxy_read_timeout 20s;

            # 🔥 Disable buffering (low latency)
            proxy_buffering off;

            # 🔥 Retry logic (rất quan trọng khi load cao)
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}